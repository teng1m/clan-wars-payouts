<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Clan Wars Payouts</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <main>
            <h1>Clan Wars Payouts</h1>

            {% if user %}
            <p>Hello, <strong>{{ user.nickname }}</strong>.</p>
            <p>Today is <span id="today"></span>.</p>
            {% if user.clan %}
            <p>You're a member of <strong>[{{ user.clan.tag }}]</strong> {{ user.clan.name }}.</p>

            <form action="/attendance/enter" method="post">
                <label>
                    Today's code:
                    <input type="text" name="code" maxlength="6" required autocomplete="off" />
                </label>
                <button type="submit">Submit</button>
            </form>
            {% else %}
            <p>You're not part of a clan!</p>
            {% endif %}

            <form action="/logout" method="post">
                <button type="submit">Log out</button>
            </form>

            <script>
                const today = document.getElementById("today");
                if (today) today.textContent = new Date().toLocaleDateString();
            </script>
            {% else %}
            <p><a href="/login">Click to log in with Wargaming</a></p>
            {% endif %}
        </main>
        <script src="/static/app.js"></script>
    </body>
</html>
